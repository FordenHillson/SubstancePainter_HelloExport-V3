name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's New
            <!-- Add release notes here after creating release -->
            
            ## Files
            - `__init__.py` - Main plugin
            - `updater.py` - Auto-update module  
            - `Enfusion_template.spexp` - Export preset
            - `Enfusion_template.json` - Export config
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}